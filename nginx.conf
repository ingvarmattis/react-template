events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/wasm
        application/xml
        application/xhtml+xml;

    # HTTP server - redirect to HTTPS only
    # honestmoving4u.com
    # If "subdomain doesn't support HSTS" persists: ensure www block below sends HSTS, and that any other
    # subdomain in DNS (mail, api, etc.) either has an HTTPS server block with HSTS or use HSTS without includeSubDomains.
    server {
        listen 80;
        server_name honestmoving4u.com;

        # ACME challenge must work without redirect
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else redirects to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # www.honestmoving4u.com - redirect to non-www
    server {
        listen 80;
        server_name www.honestmoving4u.com;

        # ACME challenge must work without redirect
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect www to non-www HTTPS
        location / {
            return 301 https://honestmoving4u.com$request_uri;
        }
    }

    # Shared SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HTTPS server - honestmoving4u.com
    server {
        listen 443 ssl;
        server_name honestmoving4u.com;
        http2 on;
        root /usr/share/nginx/html;
        index index.html;

        # SSL configuration (no OCSP in cert, stapling disabled)
        ssl_certificate /etc/letsencrypt/live/honestmoving4u.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/honestmoving4u.com/privkey.pem;

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://backend:8001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 301 ?lang=en -> / so validators never see a document at ?lang=en (no hreflang/canonical conflicts)
        if ($arg_lang = "en") {
            return 301 https://honestmoving4u.com/;
        }

        # Handle client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache-bust hashed assets and images aggressively
        location ~* ^/(assets/|.*\.(?:js|css|woff2|png|jpg|jpeg|gif|webp|svg|ico))$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # HTML should not be cached by browsers/CDN, but allow bfcache
        # Using "no-cache" instead of "no-store" allows back/forward cache to work
        location ~* \.(?:html)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        # HSTS with preload to avoid HTTP->HTTPS redirects in supporting browsers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # HTTPS server - www.honestmoving4u.com - redirect to non-www
    # HSTS must be sent here so "includeSubDomains" does not trigger "subdomain doesn't support HSTS".
    # Certificate: certbot certonly --webroot -w /var/www/certbot -d honestmoving4u.com -d www.honestmoving4u.com
    server {
        listen 443 ssl;
        server_name www.honestmoving4u.com;
        http2 on;

        ssl_certificate /etc/letsencrypt/live/honestmoving4u.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/honestmoving4u.com/privkey.pem;

        # HSTS on every response (including 301) so scanners see this subdomain as HSTS-enabled
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location / {
            if ($arg_lang = "en") {
                add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
                return 301 https://honestmoving4u.com/;
            }
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            return 301 https://honestmoving4u.com$request_uri;
        }
    }
}
